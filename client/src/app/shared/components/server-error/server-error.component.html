<div class="container mt-5 p-4 bg-gray-100 shadow-lg">
    <h1 class="text-2xl font-semibold mb-4">Internal server error</h1>
    @if(error){
        <h5 class="text-red-600">Error: {{error.message}}</h5>
        <p class="font-bold mb-2">This error comes from the server, not Angular</p>
        <h5 class="font-semibold text-lg mb-2">Stack trace</h5>
        <mat-card class="p-4 bg-white">
            <code class="block whitespace-pre-wrap">{{error.details}}</code>
        </mat-card>
    }
</div>
